# Strategy parameters — edit these to tune signal thresholds and risk controls
# DO NOT change risk limits below minimum safe values

signal:
  threshold: 0.65               # minimum XGBoost P(+2% in 5d) to enter
  forward_return_target: 0.02   # label: +2% in 5 days
  forward_days: 5

risk:
  max_position_pct: 0.02        # 2% of capital hard cap
  daily_dd_limit: 0.03          # 3% daily drawdown → circuit break
  weekly_dd_limit: 0.07         # 7% weekly drawdown → kill switch
  max_consecutive_losses: 5
  kelly_fraction: 0.5           # half-Kelly always

universe:
  min_avg_volume: 500000        # 20-day avg volume filter
  max_positions: 10             # max concurrent open positions
  segment: "EQ"

features:
  rsi_period_fast: 7
  rsi_period_slow: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_period: 20
  bb_std: 2.0
  atr_period: 14
  ema_periods: [9, 21, 50]
  vol_lookback_short: 10
  vol_lookback_long: 20
  regime_lookback: 60

model:
  train_months: 24
  test_months: 3
  purge_days: 5
  n_estimators: 500
  learning_rate: 0.05
  max_depth: 6
  min_child_weight: 50
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 0.1

# Phase 8: Ensemble and A/B testing configuration
ensemble:
  champion_model_path: ./models/production/champion_ensemble_v3.pkl
  challenger_model_path: ./models/staging/challenger_ensemble_v4.pkl
  ab_test_enabled: true
  ab_test_enabled_for: [equity]  # or [crypto] or [equity, crypto]
  ab_test_pct: 0.5  # 50% of signals to challenger
  ensemble_voting_strategy: majority  # majority or weighted
  xgb_weight: 0.4
  lgb_weight: 0.3
  patchtst_weight: 0.3

retraining:
  frequency: monthly
  lookback_years: 5
  train_window_years: 4
  val_window_years: 1
  test_window_months: 6
  concept_drift_threshold: 0.5
  trigger_on_drift: true
  quarterly_hpo_enabled: true
  hpo_n_trials: 20
  hpo_warm_start: true

backtest:
  min_sharpe: 1.5
  max_drawdown: 0.15
  min_profit_factor: 2.0
  min_win_rate: 0.52
  min_trades: 100
  risk_free_rate: 0.065         # India 10Y G-Sec

fo:
  iv_rank_sell_threshold: 0.70
  iv_rank_buy_threshold: 0.30
  iv_premium_threshold: 0.05
  max_concurrent_positions: 3
  delta_tolerance: 0.10


strategies:
  - name: vcp
    class_path: signals.strategies.vcp.VCPStrategy
    enabled: true
    asset_classes: [equity]
    interval: day
    lookback_days: 400
    params: {}
    risk_profile: default
    mode: research
    schedule: null
    min_backtest_status: null

  - name: rs_breakout
    class_path: signals.strategies.rs_breakout.RSBreakoutStrategy
    enabled: true
    asset_classes: [equity]
    interval: day
    lookback_days: 300
    params: {}
    risk_profile: default
    mode: research
    schedule: null
    min_backtest_status: null

  - name: tight_closes
    class_path: signals.strategies.tight_closes.TightClosesStrategy
    enabled: true
    asset_classes: [equity]
    interval: day
    lookback_days: 200
    params: {}
    risk_profile: default
    mode: research
    schedule: null
    min_backtest_status: null

  - name: momentum_sentinel
    class_path: signals.strategies.momentum_sentinel.MomentumSentinelStrategy
    enabled: true
    asset_classes: [equity]
    interval: day
    lookback_days: 120
    params: {}
    risk_profile: default
    mode: research
    schedule: null
    min_backtest_status: null
