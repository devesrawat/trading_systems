name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: trader
          POSTGRES_PASSWORD: password
          POSTGRES_DB: nse_trading
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U trader -d nse_trading"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Minimal settings so config/settings.py validates on import
      KITE_API_KEY:    ci-key
      KITE_API_SECRET: ci-secret
      TIMESCALE_URL:   postgresql://trader:password@localhost:5432/nse_trading
      REDIS_URL:       redis://localhost:6379/0
      PAPER_TRADE_MODE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Apply DB migrations
        run: uv run alembic upgrade head

      - name: Run tests with coverage
        run: uv run pytest tests/ -q --tb=short



  lint:
    name: Lint
    runs-on: ubuntu-latest

    env:
      KITE_API_KEY:    ci-key
      KITE_API_SECRET: ci-secret

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Ruff lint
        run: uv run ruff check . --output-format=github || true

      - name: Ruff format check
        run: uv run ruff format --check . || true
