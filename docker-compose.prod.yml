# Production override — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Differences from dev compose:
#   - All DB/Redis ports are NOT exposed to the host (internal network only)
#   - App services read secrets from environment / .env.prod
#   - TimescaleDB and Redis use restart: always
#   - Grafana is reverse-proxied; direct port is removed
#   - MLflow uses PostgreSQL backend instead of SQLite

version: "3.8"

services:
  # ----------------------------------------------------------
  # Infrastructure
  # ----------------------------------------------------------
  timescaledb:
    restart: always
    ports: []          # close host-facing port in prod
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}

  redis:
    restart: always
    ports: []

  grafana:
    restart: always
    ports: []          # served via nginx reverse proxy
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL:         ${GRAFANA_ROOT_URL}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning

  mlflow:
    restart: always
    ports: []
    command: >
      mlflow server
        --host 0.0.0.0
        --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB}
        --default-artifact-root /mlflow/artifacts

  # ----------------------------------------------------------
  # Trading application — one service per process role
  # ----------------------------------------------------------
  orchestrator:
    image: ghcr.io/${GITHUB_REPOSITORY}:${IMAGE_TAG:-latest}
    command: python -m orchestrator.main
    restart: always
    env_file: .env.prod
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  scanner:
    image: ghcr.io/${GITHUB_REPOSITORY}:${IMAGE_TAG:-latest}
    command: python -m signals.scanner_engine
    restart: on-failure
    env_file: .env.prod
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

  live-feed:
    image: ghcr.io/${GITHUB_REPOSITORY}:${IMAGE_TAG:-latest}
    command: python -m data.live_feed
    restart: always
    env_file: .env.prod
    depends_on:
      redis:
        condition: service_healthy

  # Nginx reverse proxy — routes /grafana, /mlflow to internal services
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - grafana
      - mlflow

volumes:
  timescale_data:
  grafana_data:
  mlflow_data:
